<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>NexusOS Sequoia</title>
    <style>
        :root {
            --mac-blur: blur(25px);
            --accent: #007aff;
            --wallpaper: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920');
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, sans-serif; background: var(--wallpaper) center/cover; }

        /* --- LOCK SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 20000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--wallpaper) center/cover; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #login-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); }
        .login-content { position: relative; z-index: 1; text-align: center; color: white; }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 1px solid rgba(255,255,255,0.3); }
        .login-input { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 15px; color: white; text-align: center; width: 200px; backdrop-filter: blur(10px); margin-top: 10px; }

        /* --- BARRE DE MENU --- */
        #menu-bar { position: fixed; top: 0; width: 100%; height: 30px; background: rgba(0, 0, 0, 0.3); backdrop-filter: var(--mac-blur); display: flex; align-items: center; padding: 0 15px; font-size: 13px; color: white; z-index: 10000; }
        .menu-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }

        /* --- FENÊTRES --- */
        .window { position: absolute; background: rgba(255,255,255,0.9); backdrop-filter: var(--mac-blur); border-radius: 12px; display: none; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 0.5px solid rgba(0,0,0,0.1); z-index: 10; overflow: hidden; }
        .win-header { height: 35px; display: flex; align-items: center; padding: 0 12px; cursor: move; background: rgba(0,0,0,0.05); }
        .lights { display: flex; gap: 6px; }
        .light { width: 10px; height: 10px; border-radius: 50%; }
        .close { background: #ff5f56; } .max { background: #27c93f; }
        .win-title { flex: 1; text-align: center; color: #333; font-size: 12px; font-weight: 600; }
        .win-body { flex: 1; overflow: auto; background: white; }

        /* --- NEXUS SEARCH --- */
        .nexus-container { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .nexus-logo { font-size: 45px; font-weight: bold; margin-bottom: 20px; }
        .search-bar { width: 90%; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; }

        /* --- DOCK --- */
        #dock-container { position: fixed; bottom: 10px; width: 100%; display: flex; justify-content: center; z-index: 5000; }
        #dock { background: rgba(0, 0, 0, 0.3); backdrop-filter: var(--mac-blur); padding: 8px; border-radius: 18px; display: flex; gap: 10px; border: 0.5px solid rgba(255, 255, 255, 0.2); }
        .dock-app { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; position: relative; }
        .dock-app img { width: 100%; height: 100%; border-radius: 11px; }
        .indicator { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: white; border-radius: 50%; display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-content">
        <div class="user-avatar">👤</div>
        <h3>Nexus Admin</h3>
        <input type="password" class="login-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') login()">
    </div>
</div>

<div id="menu-bar">
    <div style="font-weight:bold;"></div>
    <div class="menu-right">
        <span style="font-size: 11px;">📡 <span id="wifi-status">Nexus_5G</span></span>
        <span id="clock">00:00</span>
    </div>
</div>

<div id="win-browser" class="window" style="width:90%; height:70%; top:50px; left:5%;">
    <div class="win-header">
        <div class="lights"><div class="light close" onclick="closeWin('win-browser')"></div></div>
        <div class="win-title">Nexus Browser</div>
    </div>
    <div class="win-body">
        <div class="nexus-container">
            <div class="nexus-logo">
                <span style="color:#4285F4">N</span><span style="color:#EA4335">e</span><span style="color:#FBBC05">x</span><span style="color:#4285F4">u</span><span style="color:#34A853">s</span>
            </div>
            <input type="text" class="search-bar" placeholder="Rechercher avec Nexus Search..." onkeydown="if(event.key==='Enter') alert('Recherche en cours...')">
        </div>
    </div>
</div>

<div id="win-files" class="window" style="width:300px; height:400px; top:100px; left:20px;">
    <div class="win-header">
        <div class="lights"><div class="light close" onclick="closeWin('win-files')"></div></div>
        <div class="win-title">Finder</div>
    </div>
    <div class="win-body" style="padding: 15px;">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div>📁 Documents</div>
            <div>📂 Téléchargements</div>
            <div>🖼️ Photos</div>
        </div>
    </div>
</div>

<div id="dock-container">
    <div id="dock">
        <div class="dock-app" id="dock-files" onclick="openWin('win-files')">
            <img src="https://img.icons8.com/fluency/96/folder-invoices.png">
            <div class="indicator"></div>
        </div>
        <div class="dock-app" id="dock-browser" onclick="openWin('win-browser')">
            <img src="https://img.icons8.com/fluency/96/chrome.png">
            <div class="indicator"></div>
        </div>
        <div class="dock-app" onclick="location.reload()">
            <img src="https://img.icons8.com/fluency/96/restart.png">
        </div>
    </div>
</div>

<script>
    let zIdx = 100;
    function login() {
        document.getElementById('login-screen').style.opacity = '0';
        document.getElementById('login-screen').style.transform = 'scale(1.1)';
        setTimeout(() => document.getElementById('login-screen').style.display = 'none', 600);
    }
    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        win.style.zIndex = ++zIdx;
        const ind = document.querySelector('#dock-' + id.split('-')[1] + ' .indicator');
        if(ind) ind.style.display = 'block';
    }
    function closeWin(id) {
        document.getElementById(id).style.display = 'none';
        const ind = document.querySelector('#dock-' + id.split('-')[1] + ' .indicator');
        if(ind) ind.style.display = 'none';
    }
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }
    setInterval(updateClock, 1000); updateClock();

    // Système Drag (Compatible Tactile Mobile)
    document.querySelectorAll('.win-header').forEach(h => {
        let dragging = false, ox, oy;
        const move = (e) => {
            if(!dragging) return;
            const ev = e.touches ? e.touches[0] : e;
            h.parentElement.style.left = (ev.clientX - ox) + 'px';
            h.parentElement.style.top = (ev.clientY - oy) + 'px';
        };
        h.onmousedown = h.ontouchstart = (e) => {
            dragging = true; h.parentElement.style.zIndex = ++zIdx;
            const ev = e.touches ? e.touches[0] : e;
            ox = ev.clientX - h.parentElement.offsetLeft;
            oy = ev.clientY - h.parentElement.offsetTop;
        };
        window.onmousemove = window.ontouchmove = move;
        window.onmouseup = window.ontouchend = () => dragging = false;
    });
</script>
</body>
</html>
