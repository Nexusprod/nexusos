<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NXOS Pro</title>

<link rel="manifest" href="data:application/manifest+json,{'name':'NXOS Pro','short_name':'NXOS','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#007AFF','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/518/518713.png','sizes':'512x512','type':'image/png'}]}">

<style>
  :root { --accent: #007AFF; --glass: rgba(255, 255, 255, 0.15); --blur: blur(35px); }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{height:100vh;width:100vw;overflow:hidden;background:#000 url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;user-select:none}
  
  /* BOUTON INSTALLATION */
  #install-banner {
    position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 10px 20px;
    border-radius: 20px; z-index: 100000; cursor: pointer; display: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: bold;
  }

  /* AUTH */
  #auth-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.4);backdrop-filter:var(--blur);display:flex;align-items:center;justify-content:center}
  .auth-card{background:var(--glass);padding:40px;border-radius:35px;text-align:center;width:340px;border:1px solid rgba(255,255,255,0.2);color:white}
  .avatar{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.2);margin:0 auto 10px;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:30px}
  .auth-input{width:100%;padding:12px;border-radius:12px;border:none;background:rgba(255,255,255,0.2);color:white;text-align:center;margin:15px 0;outline:none}
  .auth-btn{width:100%;padding:12px;border-radius:12px;border:none;background:var(--accent);color:white;cursor:pointer;font-weight:600}

  /* UI ELEMENTS */
  #top-bar{position:fixed;top:0;width:100%;height:30px;background:rgba(0,0,0,0.2);backdrop-filter:blur(15px);display:flex;align-items:center;padding:0 20px;color:white;font-size:13px;z-index:5000}
  #dock-container{position:fixed;bottom:15px;width:100%;display:flex;justify-content:center;z-index:1000}
  #dock{background:rgba(255,255,255,0.2);backdrop-filter:var(--blur);padding:10px;border-radius:22px;display:flex;gap:12px;border:1px solid rgba(255,255,255,0.1)}
  .dock-item{width:50px;height:50px;background:white;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;transition:0.2s}
  .dock-item:hover{transform:scale(1.2) translateY(-10px)}

  /* WINDOWS */
  .window{position:absolute;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:18px;display:none;flex-direction:column;box-shadow:0 30px 60px rgba(0,0,0,0.3);overflow:hidden;border:1px solid white}
  .win-header{height:45px;background:rgba(0,0,0,0.03);display:flex;align-items:center;padding:0 15px;cursor:move}
  .dot{width:12px;height:12px;border-radius:50%;margin-right:8px;cursor:pointer}
</style>
</head>
<body>

<div id="install-banner" onclick="installApp()">📥 Installer NXOS sur l'appareil</div>

<div id="top-bar"><b> NXOS Pro</b><span id="clock" style="margin-left:auto">00:00</span></div>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="avatar">👤</div>
        <h3>Session Privée</h3>
        <input type="password" id="pin-input" class="auth-input" placeholder="PIN (1234)" onkeydown="if(event.key==='Enter') login()">
        <button onclick="login()" class="auth-btn">Entrer</button>
    </div>
</div>

<div id="dock-container">
    <div id="dock">
        <div class="dock-item" onclick="openWin('win-web')">🌐</div>
        <div class="dock-item" onclick="location.reload()">🔒</div>
    </div>
</div>

<div id="win-web" class="window" style="width:85%; height:80%; top:50px; left:7.5%;">
    <div class="win-header">
        <div style="display:flex; gap:8px; margin-right:15px;"><div class="dot" style="background:#ff5f56" onclick="closeWin('win-web')"></div><div class="dot" style="background:#ffbd2e"></div><div class="dot" style="background:#27c93f"></div></div>
        <input id="web-addr" type="text" value="https://www.google.com/search?igu=1" style="flex:1; background:rgba(0,0,0,0.05); border:none; padding:5px; border-radius:5px;" onkeydown="if(event.key==='Enter') document.getElementById('frame').src=this.value">
    </div>
    <iframe id="frame" src="https://www.google.com/search?igu=1" style="flex:1; border:none; background:white;"></iframe>
</div>

<script>
    // LOGIQUE INSTALLATION
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-banner').style.display = 'block';
    });

    async function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
            deferredPrompt = null;
        }
    }

    // LOGIQUE OS
    function login() { if(document.getElementById('pin-input').value==='1234') document.getElementById('auth-overlay').style.display='none'; }
    function openWin(id){ document.getElementById(id).style.display='flex'; }
    function closeWin(id){ document.getElementById(id).style.display='none'; }
    setInterval(()=>{ document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); },1000);
    
    // Drag & Drop
    document.querySelectorAll('.win-header').forEach(h => {
        let isD = false;
        h.onmousedown = () => isD = true;
        window.onmousemove = (e) => { if(isD) { h.parentElement.style.left = e.clientX - 150 + 'px'; h.parentElement.style.top = e.clientY - 20 + 'px'; } };
        window.onmouseup = () => isD = false;
    });
</script>
</body>
</html>
