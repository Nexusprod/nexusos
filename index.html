<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NXOS Pro</title>

<link rel="manifest" href="data:application/manifest+json,{'name':'NXOS Pro','short_name':'NXOS','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#007AFF','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/518/518713.png','sizes':'512x512','type':'image/png'}]}">

<style>
  :root { --accent: #007AFF; --glass: rgba(255, 255, 255, 0.15); --blur: blur(35px); }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  body{height:100vh;width:100vw;overflow:hidden;background:#000 url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;user-select:none}
  
  /* BANNIÈRE D'INSTALLATION */
  #install-btn {
    position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
    background: white; color: black; padding: 8px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600; z-index: 100000; cursor: pointer;
    display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: none;
  }

  /* BARRE DU HAUT */
  #top-bar{position:fixed;top:0;width:100%;height:30px;background:rgba(0,0,0,0.2);backdrop-filter:blur(15px);display:flex;align-items:center;padding:0 20px;color:white;font-size:12px;z-index:5000}

  /* LOCK SCREEN */
  #lock{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.4);backdrop-filter:var(--blur);display:flex;align-items:center;justify-content:center;transition:0.5s}
  .card{background:var(--glass);padding:40px;border-radius:30px;text-align:center;width:320px;border:1px solid rgba(255,255,255,0.2);color:white}
  .in{width:100%;padding:12px;border-radius:12px;border:none;background:rgba(255,255,255,0.2);color:white;text-align:center;margin:15px 0;outline:none}
  
  /* DOCK */
  #dock-wrap{position:fixed;bottom:15px;width:100%;display:flex;justify-content:center;z-index:1000}
  #dock{background:rgba(255,255,255,0.2);backdrop-filter:var(--blur);padding:10px;border-radius:22px;display:flex;gap:12px;border:1px solid rgba(255,255,255,0.1)}
  .icon{width:50px;height:50px;background:white;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;transition:0.2s}
  .icon:hover{transform:scale(1.2) translateY(-10px)}

  /* WINDOWS */
  .window{position:absolute;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:18px;display:none;flex-direction:column;box-shadow:0 30px 60px rgba(0,0,0,0.4);overflow:hidden;border:1px solid white}
  .win-head{height:45px;background:rgba(0,0,0,0.03);display:flex;align-items:center;padding:0 15px;cursor:move}
  .dot{width:12px;height:12px;border-radius:50%;margin-right:8px;cursor:pointer}
</style>
</head>
<body>

<button id="install-btn">📥 Installer l'application</button>

<div id="top-bar"><b> NXOS Pro</b> <span id="clock" style="margin-left:auto">00:00</span></div>

<div id="lock">
    <div class="card">
        <div style="width:70px;height:70px;background:rgba(255,255,255,0.2);border-radius:50%;margin:0 auto 15px;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:30px">👤</div>
        <h3>Bienvenue</h3>
        <input type="password" id="pin" class="in" placeholder="PIN (1234)" onkeydown="if(event.key==='Enter') unlock()">
        <button onclick="unlock()" style="width:100%;padding:12px;border-radius:12px;border:none;background:var(--accent);color:white;cursor:pointer;font-weight:bold">Entrer</button>
    </div>
</div>

<div id="dock-wrap">
    <div id="dock">
        <div class="icon" onclick="openWin('w-web')">🌐</div>
        <div class="icon" onclick="location.reload()">🔒</div>
    </div>
</div>

<div id="w-web" class="window" style="width:90%; height:85%; top:40px; left:5%;">
    <div class="win-head">
        <div class="dot" style="background:#ff5f56" onclick="closeWin('w-web')"></div>
        <input id="addr" type="text" value="https://www.google.com/search?igu=1" style="flex:1; background:rgba(0,0,0,0.05); border:none; padding:6px 12px; border-radius:8px; margin-left:15px; outline:none; font-size:12px;" onkeydown="if(event.key==='Enter') document.getElementById('f').src=this.value">
    </div>
    <iframe id="f" src="https://www.google.com/search?igu=1" style="flex:1; border:none; background:white;"></iframe>
</div>

<script>
    // --- SERVICE WORKER (Pour le mode Hors-ligne / Installation) ---
    if ('serviceWorker' in navigator) {
        const sw = `self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));`;
        const blob = new Blob([sw], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    // --- GESTION INSTALLATION ---
    let defPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        defPrompt = e;
        document.getElementById('install-btn').style.display = 'block';
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
        if (defPrompt) {
            defPrompt.prompt();
            const { outcome } = await defPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('install-btn').style.display = 'none';
            defPrompt = null;
        }
    });

    // --- FONCTIONS OS ---
    function unlock() { if(document.getElementById('pin').value==='1234') document.getElementById('lock').style.opacity='0'; setTimeout(()=>document.getElementById('lock').style.display='none',500); }
    function openWin(id){ document.getElementById(id).style.display='flex'; }
    function closeWin(id){ document.getElementById(id).style.display='none'; }
    setInterval(()=>{ document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); },1000);
    
    // Drag & Drop
    document.querySelectorAll('.win-head').forEach(h => {
        let isD = false;
        h.onmousedown = () => isD = true;
        window.onmousemove = (e) => { if(isD) { h.parentElement.style.left = e.clientX - 200 + 'px'; h.parentElement.style.top = e.clientY - 20 + 'px'; } };
        window.onmouseup = () => isD = false;
    });
</script>
</body>
</html>
