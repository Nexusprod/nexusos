<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOS Sequoia - Brave Edition</title>
    <style>
        :root {
            --mac-blur: blur(25px);
            --accent: #007aff;
            --brave-orange: #ff7324;
            --wallpaper: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920');
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { height: 100vh; width: 100vw; overflow: hidden; background: var(--wallpaper) center/cover; transition: 0.5s; }

        /* --- NOTIFICATIONS --- */
        #notification-container { position: fixed; top: 40px; right: 20px; z-index: 50000; display: flex; flex-direction: column; gap: 10px; }
        .notification { background: rgba(255, 255, 255, 0.9); backdrop-filter: var(--mac-blur); padding: 12px 15px; border-radius: 12px; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 0.5px solid rgba(0,0,0,0.1); animation: slideIn 0.4s ease forwards; color: #333; position: relative; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        /* --- LOGIN --- */
        #auth-screen { position: fixed; inset: 0; z-index: 30000; display: flex; align-items: center; justify-content: center; background: var(--wallpaper) center/cover; color: white; transition: 0.8s; }
        #auth-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(30px); }
        .auth-card { position: relative; z-index: 1; text-align: center; width: 320px; }
        .auth-avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid white; margin-bottom: 20px; object-fit: cover; background: #eee; }
        .auth-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.2); color: white; text-align: center; outline: none; }
        .auth-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--accent); color: white; cursor: pointer; margin-top: 10px; font-weight: bold; }

        /* --- INTERFACE --- */
        #menu-bar { position: fixed; top: 0; width: 100%; height: 30px; background: rgba(0,0,0,0.3); backdrop-filter: var(--mac-blur); display: flex; align-items: center; padding: 0 15px; color: white; z-index: 10000; font-size: 13px; }
        .window { position: absolute; background: rgba(255,255,255,0.95); backdrop-filter: var(--mac-blur); border-radius: 12px; display: none; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3); z-index: 100; overflow: hidden; border: 0.5px solid rgba(0,0,0,0.1); }
        .win-header { height: 35px; display: flex; align-items: center; padding: 0 12px; cursor: move; background: rgba(0,0,0,0.05); }
        .close-btn { width: 12px; height: 12px; border-radius: 50%; background: #ff5f56; cursor: pointer; border: none; }
        .win-body { flex: 1; background: white; color: #333; overflow: hidden; display: flex; flex-direction: column; }

        /* --- BROWSER SEARCH --- */
        .search-container { padding: 15px; background: #f1f1f1; border-bottom: 1px solid #ddd; }
        .search-bar-wrapper { display: flex; background: white; border-radius: 10px; padding: 5px 15px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-bar-wrapper input { flex: 1; border: none; padding: 10px; outline: none; font-size: 14px; }
        .results-area { flex: 1; overflow-y: auto; background: white; }
        .result-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .result-item:hover { background: #fff4ef; }

        /* --- DOCK & ICONS --- */
        #dock-container { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 5000; }
        #dock { background: rgba(0,0,0,0.3); backdrop-filter: var(--mac-blur); padding: 8px 12px; border-radius: 20px; display: flex; gap: 15px; border: 0.5px solid rgba(255,255,255,0.2); align-items: center; }
        .dock-btn { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .dock-btn:hover { transform: scale(1.2) translateY(-10px); background: rgba(255,255,255,0.2); }
        .dock-btn svg { width: 32px; height: 32px; }
    </style>
</head>
<body>

<div id="notification-container"></div>

<div id="auth-screen">
    <div class="auth-card" id="setup-card" style="display:none;">
        <h2>Configuration NexusOS</h2>
        <input type="text" id="new-name" class="auth-input" placeholder="Pseudo">
        <input type="password" id="new-pass" class="auth-input" placeholder="Mot de passe">
        <input type="text" id="security-ans" class="auth-input" placeholder="Ton plat préféré ?">
        <button onclick="createAccount()" class="auth-btn">Lancer</button>
    </div>
    <div class="auth-card" id="login-card">
        <img id="login-avatar" class="auth-avatar" src="https://img.icons8.com/fluency/96/user-male-circle.png">
        <h2 id="login-user-display">Chargement...</h2>
        <input type="password" id="login-pass" class="auth-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') tryLogin()">
        <button onclick="tryLogin()" class="auth-btn">Connexion</button>
    </div>
</div>

<div id="menu-bar"><div> <b>NexusOS</b></div><div style="margin-left:auto" id="clock">00:00</div></div>

<div id="win-search" class="window" style="width:800px; height:580px; top:50px; left:100px;">
    <div class="win-header">
        <button class="close-btn" onclick="closeWin('win-search')"></button>
        <div style="flex:1; text-align:center; font-size:12px; font-weight:bold;">Nexus Browser</div>
    </div>
    <div class="win-body">
        <div class="search-container" id="search-box">
            <div class="search-bar-wrapper">
                <input type="text" id="nexus-input" placeholder="Rechercher avec Brave..." onkeydown="if(event.key==='Enter') executeNexusSearch()">
            </div>
        </div>
        <div class="results-area" id="results-area"></div>
    </div>
</div>

<div id="win-settings" class="window" style="width:400px; height:480px; top:100px; left:200px;">
    <div class="win-header"><button class="close-btn" onclick="closeWin('win-settings')"></button></div>
    <div class="win-body" style="padding:20px;">
        <h3>Paramètres</h3>
        <input type="text" id="set-avatar" class="auth-input" style="color:black; background:#eee;" placeholder="Lien Avatar">
        <input type="text" id="set-wall" class="auth-input" style="color:black; background:#eee;" placeholder="Lien Fond d'écran">
        <button onclick="updateProfile()" class="auth-btn">Sauvegarder</button>
        <button onclick="logout()" style="margin-top:20px; color:red; background:none; border:none; cursor:pointer;">Réinitialiser l'OS</button>
    </div>
</div>

<div id="dock-container">
    <div id="dock">
        <button class="dock-btn" onclick="openWin('win-search')" title="Brave Search">
            <svg viewBox="0 0 512 512">
                <path fill="#ff7324" d="M256 0c141.4 0 256 114.6 256 256S397.4 512 256 512S0 397.4 0 256S114.6 0 256 0zM176.4 128.4l-32.3 90.4l-25.7 1.8c-10.4 .7-18.4 9.4-18.4 19.8c0 10.9 8.9 19.8 19.8 19.8l11.1 0l38.2 125c1.6 5.3 6.6 8.8 12.1 8.8s10.5-3.5 12.1-8.8l32.8-107.4l20.4 0l32.8 107.4c1.6 5.3 6.6 8.8 12.1 8.8s10.5-3.5 12.1-8.8l38.2-125l11.1 0c10.9 0 19.8-8.9 19.8-19.8c0-10.4-8-19.1-18.4-19.8l-25.7-1.8l-32.3-90.4c-1.8-5-6.6-8.4-11.9-8.4s-10.1 3.4-11.9 8.4L278.4 220.6l-44.8 0L200.2 128.4c-1.8-5-6.6-8.4-11.9-8.4s-10.1 3.4-11.9 8.4z"/>
            </svg>
        </button>

        <button class="dock-btn" onclick="openWin('win-settings')" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('nexus_v13_db')) || null;

    window.onload = () => {
        if(!db) {
            document.getElementById('login-card').style.display = 'none';
            document.getElementById('setup-card').style.display = 'block';
        } else {
            document.getElementById('login-user-display').innerText = db.name;
            document.getElementById('login-avatar').src = db.avatar || "https://img.icons8.com/fluency/96/user-male-circle.png";
            if(db.wall) document.body.style.backgroundImage = `url('${db.wall}')`;
        }
    }

    function createAccount() {
        const name = document.getElementById('new-name').value;
        const pass = document.getElementById('new-pass').value;
        const ans = document.getElementById('security-ans').value.toLowerCase();
        if(name && pass && ans) {
            db = { name, pass, security: ans, avatar: "", wall: "" };
            localStorage.setItem('nexus_v13_db', JSON.stringify(db));
            location.reload();
        }
    }

    function tryLogin() {
        if(document.getElementById('login-pass').value === db.pass) {
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('auth-screen').style.display = 'none'; }, 800);
            sendNotify("NexusOS", "Session ouverte.");
        } else { alert("Erreur."); }
    }

    function executeNexusSearch() {
        const query = document.getElementById('nexus-input').value.toLowerCase();
        const area = document.getElementById('results-area');
        area.innerHTML = `<div class="result-item" onclick="webSearch('${query}')"><h3>🔍 Rechercher "${query}" sur Brave</h3><p>Propulsé par Brave Search Engine.</p></div>`;
    }

    function webSearch(q) {
        document.getElementById('search-box').style.display = 'none';
        document.getElementById('results-area').innerHTML = `
            <div style="background:#1b1b1b; padding:8px; display:flex; align-items:center; gap:10px;">
                <button onclick="resetSearchUI()" style="background:#ff7324; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">← Retour</button>
                <small style="color:white;">Brave : ${q}</small>
            </div>
            <iframe src="https://search.brave.com/search?q=${encodeURIComponent(q)}" style="width:100%; height:490px; border:none; background:white;"></iframe>`;
    }

    function resetSearchUI() {
        document.getElementById('search-box').style.display = 'block';
        document.getElementById('nexus-input').value = "";
        document.getElementById('results-area').innerHTML = "";
    }

    function updateProfile() {
        const av = document.getElementById('set-avatar').value;
        const wl = document.getElementById('set-wall').value;
        if(av) db.avatar = av;
        if(wl) { db.wall = wl; document.body.style.backgroundImage = `url('${wl}')`; }
        localStorage.setItem('nexus_v13_db', JSON.stringify(db));
        sendNotify("Système", "Profil mis à jour.");
    }

    function sendNotify(title, text) {
        const container = document.getElementById('notification-container');
        const n = document.createElement('div');
        n.className = 'notification';
        n.innerHTML = `<b>${title}</b><br><small>${text}</small>`;
        container.appendChild(n);
        setTimeout(() => n.remove(), 4000);
    }

    function logout() { localStorage.clear(); location.reload(); }
    function openWin(id) { document.getElementById(id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; if(id==='win-search') resetSearchUI(); }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}); }, 1000);

    document.querySelectorAll('.win-header').forEach(h => {
        let drag = false, ox, oy;
        h.onmousedown = (e) => { drag = true; ox = e.clientX - h.parentElement.offsetLeft; oy = e.clientY - h.parentElement.offsetTop; };
        window.onmousemove = (e) => { if(drag) { h.parentElement.style.left = (e.clientX - ox)+'px'; h.parentElement.style.top = (e.clientY - oy)+'px'; } };
        window.onmouseup = () => drag = false;
    });
</script>
</body>
</html>
