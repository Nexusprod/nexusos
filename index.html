<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"NexusOS Sequoia","short_name":"NexusOS","start_url":"index.html","display":"standalone","background_color":"#000000","theme_color":"#007aff","icons":[{"src":"https://img.icons8.com/fluency/144/mac-os.png","sizes":"144x144","type":"image/png"}]}'>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007aff">
    <title>NexusOS Sequoia</title>

    <style>
        :root {
            --mac-blur: blur(25px);
            --accent: #007aff;
            --wallpaper: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920');
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, sans-serif; background: var(--wallpaper) center/cover; }

        /* --- LOCK SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 20000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--wallpaper) center/cover; transition: 0.8s;
        }
        #login-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); }
        .login-content { position: relative; z-index: 1; text-align: center; color: white; }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 1px solid rgba(255,255,255,0.3); }
        .login-input { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 15px; color: white; text-align: center; width: 200px; backdrop-filter: blur(10px); }

        /* --- INTERFACE --- */
        #menu-bar { position: fixed; top: 0; width: 100%; height: 30px; background: rgba(0, 0, 0, 0.3); backdrop-filter: var(--mac-blur); display: flex; align-items: center; padding: 0 15px; font-size: 13px; color: white; z-index: 10000; }
        
        .window { position: absolute; background: rgba(255,255,255,0.9); backdrop-filter: var(--mac-blur); border-radius: 12px; display: none; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3); z-index: 10; overflow: hidden; border: 0.5px solid rgba(0,0,0,0.1); }
        .win-header { height: 35px; display: flex; align-items: center; padding: 0 12px; cursor: move; background: rgba(0,0,0,0.05); }
        .light { width: 10px; height: 10px; border-radius: 50%; background: #ff5f56; cursor: pointer; }
        .win-body { flex: 1; background: white; padding: 20px; }

        #dock-container { position: fixed; bottom: 10px; width: 100%; display: flex; justify-content: center; z-index: 5000; }
        #dock { background: rgba(0, 0, 0, 0.3); backdrop-filter: var(--mac-blur); padding: 8px; border-radius: 18px; display: flex; gap: 10px; border: 0.5px solid rgba(255, 255, 255, 0.2); }
        .dock-app { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; }
        .dock-app img { width: 100%; height: 100%; border-radius: 11px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-content">
        <div class="user-avatar">👤</div>
        <h3 style="margin-bottom:10px;">Nexus Admin</h3>
        <input type="password" class="login-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') login()">
    </div>
</div>

<div id="menu-bar">
    <div style="font-weight:bold;"> NexusOS</div>
    <div style="margin-left:auto" id="clock">00:00</div>
</div>

<div id="win-browser" class="window" style="width:90%; height:70%; top:50px; left:5%;">
    <div class="win-header"><div class="light" onclick="closeWin('win-browser')"></div></div>
    <div class="win-body">
        <h1 style="text-align:center; color:#4285F4; margin-top:50px;">Nexus Search</h1>
        <input type="text" placeholder="Rechercher..." style="width:100%; padding:12px; border-radius:20px; border:1px solid #ddd; margin-top:20px;">
    </div>
</div>

<div id="dock-container">
    <div id="dock">
        <div class="dock-app" onclick="openWin('win-browser')">
            <img src="https://img.icons8.com/fluency/96/chrome.png">
        </div>
        <div class="dock-app" onclick="location.reload()">
            <img src="https://img.icons8.com/fluency/96/restart.png">
        </div>
    </div>
</div>

<script>
    function login() {
        document.getElementById('login-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('login-screen').style.display = 'none', 600);
    }
    function openWin(id) { document.getElementById(id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }
    setInterval(updateClock, 1000); updateClock();

    // Drag simple pour mobile
    document.querySelectorAll('.win-header').forEach(h => {
        let dragging = false, ox, oy;
        h.ontouchstart = (e) => {
            dragging = true;
            ox = e.touches[0].clientX - h.parentElement.offsetLeft;
            oy = e.touches[0].clientY - h.parentElement.offsetTop;
        };
        window.ontouchmove = (e) => {
            if(!dragging) return;
            h.parentElement.style.left = (e.touches[0].clientX - ox) + 'px';
            h.parentElement.style.top = (e.touches[0].clientY - oy) + 'px';
        };
        window.ontouchend = () => dragging = false;
    });
</script>
</body>
</html>
